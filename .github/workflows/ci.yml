name: URL Shortener CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


concurrency:
  group: url-shortener-pipeline
  cancel-in-progress: true


jobs:

# =========================
# 1. TEST
# =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest -v

      - name: Run Coverage
        run: pytest --cov=. --cov-report=term-missing


# =========================
# 2. BUILD
# =========================
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: url-shortener:${{ github.sha }}


# =========================
# 3. SECURITY SCAN
# =========================
  security-scan:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Image for Scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: url-shortener:${{ github.sha }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH


# =========================
# 4. DOCKER PUSH
# =========================
  docker-push:
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dharshank456/url-shortener:latest
            dharshank456/url-shortener:${{ github.sha }}


# =========================
# 5. DEPLOY TO EC2
# =========================
  deploy:
    needs: docker-push
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker compose -f /opt/url-shortener/docker-compose.yml pull
            docker compose -f /opt/url-shortener/docker-compose.yml up -d --force-recreate
            docker image prune -f


# =========================
# 6. SLACK NOTIFICATION (MARKETPLACE ACTION)
# =========================
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Set Message
        id: msg
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "message=✅ URL Shortener deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "message=❌ URL Shortener deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "${{ steps.msg.outputs.message }}\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
