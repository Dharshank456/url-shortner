name: URL Shortener CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: url-shortener-pipeline
  cancel-in-progress: true

jobs:

  test:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -v

      - name: Run Coverage
        run: |
          pytest --cov=. --cov-report=term-missing


  build:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: url-shortener:${{ github.sha }}


  security-scan:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH


  docker-push:
    needs: security-scan
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Image
        run: |
          docker tag url-shortener:${{ github.sha }} dharshank456/url-shortener:${{ github.sha }}
          docker tag url-shortener:${{ github.sha }} dharshank456/url-shortener:latest

      - name: Push SHA Tag
        run: |
          docker push dharshank456/url-shortener:${{ github.sha }}

      - name: Push Latest Tag
        run: |
          docker push dharshank456/url-shortener:latest


  deploy:
    needs: docker-push
    runs-on: self-hosted

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Application EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker compose -f /opt/url-shortener/docker-compose.yml pull
            docker compose -f /opt/url-shortener/docker-compose.yml up -d --force-recreate
            docker image prune -f


  notify:
    needs: deploy
    runs-on: self-hosted
    if: always()

    steps:
      - name: Set Notification Message
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "message=✅ URL Shortener deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "message=❌ URL Shortener deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ steps.status.outputs.message }}
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}"
