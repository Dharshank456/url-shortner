name: URL Shortener CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


# 🔒 prevent multiple pipelines running together
concurrency:
  group: url-shortener-pipeline
  cancel-in-progress: true


jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -v

      - name: Run Coverage
        run: |
          pytest --cov=. --cov-report=term-missing


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t url-shortener:${{ github.sha }} .


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t url-shortener:${{ github.sha }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH


  docker-push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            dharshank456/url-shortener:latest
            dharshank456/url-shortener:${{ github.sha }}


  deploy:
    runs-on: ubuntu-latest
    needs: docker-push

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/url-shortener
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

      - name: Slack Success Notification
        if: success()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{
            "text":"✅ URL Shortener deployed successfully\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
          }' \
          "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Slack Failure Notification
        if: failure()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{
            "text":"❌ URL Shortener deployment failed\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
          }' \
          "${{ secrets.SLACK_WEBHOOK_URL }}"
