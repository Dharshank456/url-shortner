name: URL Shortener CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: url-shortener-pipeline
  cancel-in-progress: true

jobs:

  # =========================
  # 1. TEST
  # =========================
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest -v

      - name: Run Coverage
        run: pytest --cov=. --cov-report=term-missing


  # =========================
  # 2. BUILD
  # =========================
  build:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: url-shortener:${{ github.sha }}


  # =========================
  # 3. SECURITY SCAN
  # =========================
  security-scan:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: url-shortener:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH


  # =========================
  # 4. DOCKER PUSH
  # =========================
  docker-push:
    needs: security-scan
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Image
        run: |
          docker tag url-shortener:${{ github.sha }} \
          dharshank456/url-shortener:${{ github.sha }}

          docker tag url-shortener:${{ github.sha }} \
          dharshank456/url-shortener:latest

      - name: Push SHA Tag
        run: |
          docker push dharshank456/url-shortener:${{ github.sha }}

      - name: Push Latest Tag
        run: |
          docker push dharshank456/url-shortener:latest


  # =========================
  # 5. DEPLOY
  # =========================
  deploy:
    needs: docker-push
    runs-on: self-hosted

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Container
        run: |
          docker compose -f /opt/url-shortener/docker-compose.yml pull
          docker compose -f /opt/url-shortener/docker-compose.yml up -d --force-recreate
          docker image prune -f


  # =========================
  # 6. SLACK NOTIFICATION
  # =========================
  notify:
    needs: deploy
    runs-on: self-hosted
    if: always()

    steps:
      - name: Set Message
        id: msg
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "message=✅ URL Shortener deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "message=❌ URL Shortener deployment failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ steps.msg.outputs.message }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |
                    ${{ steps.msg.outputs.message }}

                    *Repository:* ${{ github.repository }}
                    *Branch:* ${{ github.ref_name }}
                    *Commit:* ${{ github.sha }}
