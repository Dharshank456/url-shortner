<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        .title {
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-7">

            <div class="card shadow-lg">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4 title">
                        🔗 URL Shortener v5.3
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Paste your long URL and get a short link instantly
                    </p>

                    <form action="/shorten" method="POST">

                        <!-- URL INPUT -->
                        <div class="mb-3">
                            <label class="form-label">Enter URL</label>
                            <input
                                type="url"
                                class="form-control"
                                name="url"
                                placeholder="https://example.com"
                                required
                                autofocus
                            >
                        </div>

                        <!-- CUSTOM ALIAS -->
                        <div class="mb-3">
                            <label class="form-label">Custom Alias (Optional)</label>
                            <input
                                type="text"
                                class="form-control"
                                name="custom_alias"
                                placeholder="my-link"
                            >
                            <small class="text-muted">
                                Example: mysite → yoursite.com/mysite
                            </small>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg" type="submit">
                                Shorten URL
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
