<!DOCTYPE html>
<html>
<head>
    <title>Short URL Created</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-8">

            <div class="card shadow-lg">

                <div class="card-body p-5 text-center">

                    <h2 class="mb-4">
                        ✅ URL Created
                    </h2>

                    <!-- Short URL -->
                    <input
                        id="shortUrl"
                        class="form-control text-center mb-3"
                        value="{{ request.host_url }}{{ short_code }}"
                        readonly
                    >

                    <!-- Copy Button -->
                    <button
                        class="btn btn-success"
                        onclick="copyUrl()">
                        Copy URL
                    </button>

                    <br><br>

                    <!-- Analytics -->
                    <a class="btn btn-info" href="/stats/{{ short_code }}">
                        View Analytics
                    </a>

                    <a class="btn btn-secondary" href="/">
                        Create Another
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- 🔥 FIXED COPY LOGIC -->
<script>
function copyUrl() {
    const text = document.getElementById("shortUrl").value;

    // Create temporary textarea (works on HTTP + EC2 + all browsers)
    const temp = document.createElement("textarea");
    temp.value = text;

    document.body.appendChild(temp);
    temp.select();
    temp.setSelectionRange(0, 99999);

    try {
        document.execCommand("copy");
        alert("Copied!");
    } catch (err) {
        console.error("Copy failed:", err);
        alert("Copy failed!");
    }

    document.body.removeChild(temp);
}
</script>

</body>
</html>
